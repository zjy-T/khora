<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="sphere" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#e8a84a"/>
      <stop offset="45%" stop-color="#B87333"/>
      <stop offset="100%" stop-color="#6a3a10"/>
    </radialGradient>
    <radialGradient id="inner" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.4"/>
    </radialGradient>
    <radialGradient id="hi" cx="35%" cy="28%" r="28%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="silk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4960a" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#f0c060" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#9a5c10" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="96" fill="url(#sphere)"/>
  <!-- chatoyant silk bands -->
  <ellipse cx="100" cy="100" rx="96" ry="18" fill="url(#silk)" transform="rotate(-20 100 100)"/>
  <ellipse cx="100" cy="100" rx="96" ry="10" fill="#d4960a" fill-opacity="0.2" transform="rotate(-20 100 100) translate(0 -28)"/>
  <ellipse cx="100" cy="100" rx="96" ry="10" fill="#d4960a" fill-opacity="0.15" transform="rotate(-20 100 100) translate(0 28)"/>
  <circle cx="100" cy="100" r="96" fill="url(#inner)"/>
  <circle cx="100" cy="100" r="96" fill="url(#hi)"/>
</svg>

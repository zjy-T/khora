<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="sphere" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#e87070"/>
      <stop offset="45%" stop-color="#B03030"/>
      <stop offset="100%" stop-color="#6a1515"/>
    </radialGradient>
    <radialGradient id="inner" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.45"/>
    </radialGradient>
    <radialGradient id="hi" cx="35%" cy="28%" r="30%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <circle cx="100" cy="100" r="96" fill="url(#sphere)"/>
  <!-- banding streaks like agate -->
  <ellipse cx="100" cy="108" rx="60" ry="18" fill="#9a2020" fill-opacity="0.25" transform="rotate(-15 100 100)"/>
  <ellipse cx="100" cy="90" rx="45" ry="12" fill="#cc4444" fill-opacity="0.18" transform="rotate(-15 100 100)"/>
  <circle cx="100" cy="100" r="96" fill="url(#inner)"/>
  <circle cx="100" cy="100" r="96" fill="url(#hi)"/>
</svg>

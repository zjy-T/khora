<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="sphere" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#6080cc"/>
      <stop offset="45%" stop-color="#1F4080"/>
      <stop offset="100%" stop-color="#0a1a40"/>
    </radialGradient>
    <radialGradient id="inner" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.5"/>
    </radialGradient>
    <radialGradient id="hi" cx="35%" cy="28%" r="30%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="transparent"/>
